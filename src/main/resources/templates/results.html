<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Analysis Results | Smart Crop Advisory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Telugu:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body class="lang-en">

<!-- ════ TOP BAR ════ -->
<header class="top-bar">
  <a href="/" class="top-brand">
    <div class="top-logo">🌾</div>
    <div>
      <div class="top-title" data-i18n="appName">Smart Crop Advisory</div>
      <div class="top-sub"   data-i18n="appSub">AI-Powered Farming</div>
    </div>
  </a>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        id="btnTe" onclick="setLang('te')">తె</button>
  </div>
</header>

<!-- ════ MAIN ════ -->
<main class="app-body">
  <div class="page-content">

    <div class="result-header">
      <div class="result-success-ring">
        <div class="result-success-emoji">✅</div>
      </div>
      <h2 data-i18n="resultTitle">Analysis Complete</h2>
      <p  data-i18n="resultSub">Your personalized crop advisory is ready</p>
    </div>

    <!-- Result cards injected by script.js -->
    <div class="result-cards" id="resultCards"></div>

    <a href="/soil" class="back-btn">
      ← <span data-i18n="btnNewAnalysis">New Analysis</span>
    </a>

  </div>
</main>

<!-- ════ BOTTOM NAV ════ -->
<nav class="bottom-nav">
  <a href="/"        class="nav-item">
    <div class="nav-icon-wrap">🏠</div>
    <span data-i18n="navHome">Home</span>
  </a>
  <a href="/soil"    class="nav-item active">
    <div class="nav-icon-wrap">🔬</div>
    <span data-i18n="navPredict">Predict</span>
  </a>
  <a href="/weather" class="nav-item">
    <div class="nav-icon-wrap">🌤️</div>
    <span data-i18n="navWeather">Weather</span>
  </a>
  <a href="/about"   class="nav-item">
    <div class="nav-icon-wrap">ℹ️</div>
    <span data-i18n="navAbout">About</span>
  </a>
</nav>

<script src="/script.js"></script>
</body>
</html>
