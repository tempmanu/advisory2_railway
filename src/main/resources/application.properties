# =============================
# Server Port — Railway injects PORT automatically
# =============================
server.port=${PORT:8080}

# =============================
# MySQL Database — Railway injects these env vars
# =============================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/smart_crop_db}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:manoj@2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / Hibernate Settings
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================
# App Name
# =============================
spring.application.name=smart-crop-advisory
